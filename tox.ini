[tox]
requires = tox>=4.30
env_list = py314, lint, type, tests, check

[testenv]
description = Run unit and integration tests
package = editable
setenv =
    PYTHONPATH = {toxinidir}/src
deps =
    pytest
    pytest-asyncio
    pytest-cov
commands =
    pytest {posargs}

[testenv:lint]
description = Run Ruff lint checks
skip_install = true
deps =
    ruff
commands =
    ruff check src tests

[testenv:type]
description = Run mypy type checks
deps =
    mypy
commands =
    mypy src

[testenv:tests]
description = Explicit tests alias for local/forge integration

[testenv:check]
description = Aggregate quality gate
skip_install = true
deps =
    tox
commands =
    tox -e lint,type,tests
